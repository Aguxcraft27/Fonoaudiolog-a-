    @media (max-width: 640px) {

          <section style={{ background: C.sagePale, padding: "72px 24px" }}>
            <div style={{ maxWidth: 1100, margin: "0 auto" }}>

              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(250px, 1fr))", gap: 20 }}>
                {SERVICES.slice(0, 6).map(s => (
                  <div key={s.title} style={{ background: C.white, borderRadius: 20, padding: "24px", transition: "transform 0.2s, box-shadow 0.2s" }}

              <div style={{ fontSize: 13, color: "rgba(255,255,255,0.4)" }}>© 2025 Ana Scrimaglio · Todos los derechos reservados</div>
              <div style={{ display: "flex", gap: 16 }}>
                {["Privacidad", "Términos", "Admin"].map(l => (
                  <span key={l} style={{ fontSize: 13, color: "rgba(255,255,255,0.4)", cursor: "pointer" }}
                    onClick={() => l === "Admin" && setPage("admin")}
                    onMouseEnter={e => e.currentTarget.style.color = "rgba(255,255,255,0.8)"}
                    onMouseLeave={e => e.currentTarget.style.color = "rgba(255,255,255,0.4)"}>{l}</span>
                ))}
              </div>
            </div>
          </div>
        </footer>
      );
    }

    // ── App ────────────────────────────────────────────────────────────────────

    function App() {
      const [page, setPage] = useState("home");
      useEffect(() => { window.scrollTo({ top: 0, behavior: "smooth" }); }, [page]);

      const pages = {
        home: <HomePage setPage={setPage} />,
        about: <AboutPage />,
        services: <ServicesPage setPage={setPage} />,
        booking: <BookingPage />,
        admin: <AdminPage />,
      };

      return (
        <div style={{ fontFamily: "'Palatino Linotype', Palatino, Georgia, serif", background: C.cream, minHeight: "100vh", color: C.text }}>
          <NavBar page={page} setPage={setPage} />
          <main style={{ paddingTop: page === "home" ? 0 : 0 }}>{pages[page] || <HomePage setPage={setPage} />}</main>
          {page !== "admin" && <Footer setPage={setPage} />}
          <WaBtn />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
